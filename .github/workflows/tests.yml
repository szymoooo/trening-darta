name: DartPro Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Unit Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: node tests.js

      - name: Check HTML integrity
        run: |
          echo "Checking index.html structure..."
          test -f index.html || (echo "❌ index.html missing" && exit 1)
          grep -q "<!DOCTYPE html>" index.html && echo "✅ DOCTYPE present"
          grep -q "</html>" index.html && echo "✅ Closing html tag"
          grep -q "femoshkoumxikrcjhool.supabase.co" index.html && echo "✅ Supabase URL"
          grep -q "function handleLogin" index.html && echo "✅ Auth logic"
          grep -q "function renderDartboard" index.html && echo "✅ Dartboard SVG"
          grep -q "const CHECKOUTS" index.html && echo "✅ Checkouts table"
          grep -q "function startPolling" index.html && echo "✅ Multiplayer"
          grep -q "function saveRound" index.html && echo "✅ Match logic"
          grep -q "caWin\|showWinPopup" index.html && echo "✅ Win detection"
          echo "All checks passed!"

      - name: Generate test report
        if: always()
        run: |
          node tests.js > test_output.txt 2>&1 || true
          echo "Test run completed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test_output.txt
